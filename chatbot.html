<!doctype html>
<html lang="en">
<head>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="./accessibility.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Level Hub - Aria Chat Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&family=JetBrains+Mono:wght=400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body id="dashboard-global-body" class="bg-[#eaeded] text-[#111111] antialiased font-sans p-6">

    <div id="page-wrapper" class="w-full min-h-screen flex items-center justify-center mx-auto transition-all duration-300">
        <div class="max-w-3xl mx-auto bg-white rounded-2xl border border-slate-200 shadow-md overflow-hidden flex flex-col h-[600px] w-full">
            
            <div class="bg-[#232f3e] p-4 text-white flex items-center justify-between border-b border-slate-700">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-[#ff9900] flex items-center justify-center font-bold text-slate-950 font-display">
                        A
                    </div>
                    <div>
                        <h1 class="text-sm font-bold tracking-tight">Customer Service Chat (Aria Coach)</h1>
                        <p class="text-[10px] text-emerald-400 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full inline-block animate-pulse"></span>
                            T-Level Advisor Portal Active
                        </p>
                    </div>
                </div>
                <button onclick="clearChatHistory()" class="text-[10px] bg-slate-800 hover:bg-red-950 hover:text-red-400 border border-slate-700 px-2 py-1 rounded font-mono transition cursor-pointer">
                    Clear Logs
                </button>
            </div>

            <div id="chat-messages-box" class="flex-1 p-4 overflow-y-auto space-y-3 bg-slate-50 text-xs"></div>

            <div class="p-3 bg-white border-t border-slate-100 flex gap-2">
                <input id="chat-input" type="text" onkeydown="if(event.key === 'Enter') dispatchUserMessage()" placeholder="Ask about 'hours', 'rules', 'XP', 'industry placements'..." class="flex-1 px-4 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-[#ff9900]" />
                <button onclick="dispatchUserMessage()" class="bg-[#ff9900] hover:bg-[#e48900] text-slate-900 font-bold px-4 rounded-xl text-xs transition cursor-pointer">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        let loadedBlocklist = [];

        // Comprehensive educational dictionary grouping structural target keywords for advanced context lookups
        const KNOWLEDGE_BASE = [
            {
                intents: ['hour', 'duration', 'time', 'length', 'day', 'weeks', 'minimum'],
                response: "Under UK Department for Education guidelines, your T-Level Industry Placement must cover a minimum of <strong>315 hours</strong> (approximately 45 working days). It can extend up to 450 hours total for deep professional development context."
            },
            {
                intents: ['xp', 'point', 'streak', 'level', 'gamification', 'score'],
                response: "Your institutional portal grants **XP milestones** and increases your active **study streak counters** every time you log dynamic reflection entries or complete self-paced technical guidance chapters."
            },
            {
                intents: ['rule', 'law', 'guideline', 'health', 'safety', 'gdpr', 'act', 'legal', 'policy'],
                response: "All T-Level student frameworks strictly align with the **Health and Safety at Work Act (1974)** and **UK GDPR processing protocols**. Your host employer must supply a verifiable workplace safety induction during day one initialization."
            },
            {
                intents: ['logbook', 'diary', 'submit', 'record', 'entry', 'evidence', 'add hours', 'track'],
                response: "To secure credit, utilize the **'Track Placement Orders (Logbook)'** workspace menu. You must supply your tracked decimal hours, select specific learning objectives, and commit a qualitative self-reflection paragraph."
            },
            {
                intents: ['employer', 'company', 'industry', 'host', 'interview', 'find', 'corporate'],
                response: "Placements are completed with vetted industry employers. If you are struggling to secure an active host connection, schedule an appointment immediately with your college's dedicated external placement coordinator."
            },
            {
                intents: ['grade', 'mark', 'pass', 'fail', 'assess', 'exam', 'certificate'],
                response: "While placement logs don't receive traditional numeric test marks, clearing your 315 hours and achieving satisfactory employer sign-offs on core learning outcomes is **mandatory** to pass your comprehensive T-Level certification."
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof applyGlobalAccessibilityStateTokens === 'function') {
                applyGlobalAccessibilityStateTokens();
            }
            initializeChatWorkspace();
            loadBlocklistFile();
        });

        async function loadBlocklistFile() {
            try {
                const response = await fetch('./blocklist.txt');
                if (!response.ok) throw new Error("File missing");
                const textData = await response.text();
                loadedBlocklist = textData
                    .split('\n')
                    .map(word => word.trim().toLowerCase())
                    .filter(word => word.length > 0);
                console.log(`Compliance Guardrails Active: ${loadedBlocklist.length} terms loaded.`);
            } catch (error) {
                console.warn("Using fallback local moderation profile context:", error);
                loadedBlocklist = ["hack", "bypass", "exploit"]; 
            }
        }

        function containsProhibitedContent(textContent) {
    if (!textContent) return false;

    // 1. Convert to lowercase and strip structural accents/diacritics (e.g., "bîtch" -> "bitch")
    let normalized = textContent.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    // 2. Transliterate lookalike character variations and numbers (Leetspeak)
    normalized = normalized
        .replace(/0/g, 'o')
        .replace(/1/g, 'i')
        .replace(/3/g, 'e')
        .replace(/4/g, 'a')
        .replace(/5/g, 's')
        .replace(/7/g, 't')
        .replace(/@/g, 'a')
        .replace(/\$/g, 's')
        .replace(/\|/g, 'i');

    // 3. Remove all symbols, spacing, and inner-word punctuation (e.g., "f.u_c-k" -> "fuck")
    const cleanStrippedText = normalized.replace(/[^a-z0-9\s]/g, "");

    // 4. Split text into an array of words to test individual targets
    const individualWords = cleanStrippedText.split(/\s+/);

    // 5. Evaluate against the loaded compliance blocklist
    const hasViolation = loadedBlocklist.some(blockedWord => {
        if (!blockedWord) return false;
        
        // Triggers the popup if the clean word is found anywhere inside the phrase or standalone words
        return cleanStrippedText.includes(blockedWord) || 
               individualWords.includes(blockedWord) || 
               normalized.includes(blockedWord);
    });

    return hasViolation;
}

function dispatchUserMessage() {
    const input = document.getElementById('chat-input');
    const query = input.value.trim();
    if (!query) return;

    // 🚨 THIS IS WHERE THE POPUP IS ENFORCED FOR ALL VARIATIONS
    if (containsProhibitedContent(query)) {
        alert("System Warning: Your message contains terms prohibited within the portal's compliance registry.");
        input.value = '';
        return; // 🛑 Drops execution immediately so it never shows in the chat logs!
    }

    appendChatBubble(query, 'user');
    input.value = '';

    setTimeout(() => {
        const response = matchBotResponse(query.toLowerCase());
        appendChatBubble(response, 'bot');
    }, 500);
}

        function getStudentName() {
            const sessionName = localStorage.getItem('activeSession') || 'Taylor Brooke';
            return sessionName.split(' ')[0];
        }

        function initializeChatWorkspace() {
            const username = localStorage.getItem('activeSession') || 'default_user';
            const cacheKey = `chat_history_${username}`;
            const existingHistory = localStorage.getItem(cacheKey);

            if (existingHistory) {
                document.getElementById('chat-messages-box').innerHTML = existingHistory;
                scrollToBottom();
            } else {
                appendChatBubble(`Hello ${getStudentName()}! I'm Aria, your advanced educational diagnostic advisor. Ask me specific analytical questions regarding your T-Level policy compliance guidelines, minimum hour criteria, logbook configurations, or framework rules!`, 'bot');
            }
        }

        // SECURE BUBBLE CONTEXT HANDLER: Uses textContent alongside strong tags to eliminate innerHTML injection surface exploits
        function appendChatBubble(text, sender) {
            const box = document.getElementById('chat-messages-box');
            const wrapper = document.createElement('div');
            
            wrapper.className = sender === 'user' ? "flex justify-end" : "flex justify-start";
            
            const messageCard = document.createElement('div');
            messageCard.className = sender === 'user' 
                ? "bg-slate-800 text-white p-3 rounded-2xl rounded-tr-none max-w-[80%] shadow-xs font-medium text-right"
                : "bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-none max-w-[80%] shadow-xs text-slate-800 leading-relaxed";

            // Process styling elements securely without blindly trusting innerHTML
            let formattedText = text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/&lt;strong&gt;(.*?)&lt;\/strong&gt;/g, '<strong>$1</strong>');

            messageCard.innerHTML = formattedText;
            wrapper.appendChild(messageCard);
            box.appendChild(wrapper);
            
            scrollToBottom();
            
            const username = localStorage.getItem('activeSession') || 'default_user';
            localStorage.setItem(`chat_history_${username}`, box.innerHTML);
        }

        async function dispatchUserMessage() {
    const input = document.getElementById('chat-input');
    const query = input.value.trim();
    if (!query) return;

    // 1. Run local fuzzy-blocklist regex safety check first
    if (containsProhibitedContent(query)) {
        alert("System Warning: Your message contains terms prohibited within the portal's compliance registry.");
        input.value = '';
        return;
    }

    try {
        // 2. 🌐 Query the automated cloud AI filter endpoint to inspect meaning/intent
        const checkResponse = await fetch('/api/verify-content', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: query })
        });
        
        const checkResult = await checkResponse.json();

        // If the external safety filter flags the content as rude or unsafe
        if (!checkResult.success || checkResult.flagged) {
            alert(`🚨 Portal Notification: ${checkResult.reason || "Submission rejected by automated safety checks."}`);
            input.value = '';
            return;
        }

    } catch (err) {
        console.warn("External safety check timed out, falling back to local controls.");
    }

    // 3. Proceed normally if the text passes all checks
    appendChatBubble(query, 'user');
    input.value = '';

    setTimeout(() => {
        const response = matchBotResponse(query.toLowerCase());
        appendChatBubble(response, 'bot');
    }, 500);
}
        // INTENT-BASED DIAGNOSTIC MATCH ROUTER
        function matchBotResponse(msg) {
            // Evaluates phrase structures dynamically against our knowledge base matrices
            const match = KNOWLEDGE_BASE.find(node => 
                node.intents.some(keyword => msg.includes(keyword))
            );

            if (match) {
                return match.response;
            }

            // Firm, educational containment loop if the prompt is out-of-scope
            return `I can only address verified curriculum questions regarding your T-Level timeline. Please adjust your request to explore your **hours**, **logbook updates**, **employer rules**, or **grading criteria**, ${getStudentName()}.`;
        }

        function scrollToBottom() {
            const box = document.getElementById('chat-messages-box');
            box.scrollTop = box.scrollHeight;
        }

        function clearChatHistory() {
            if (confirm("Clear live diagnostic chat storage?")) {
                const username = localStorage.getItem('activeSession') || 'default_user';
                localStorage.removeItem(`chat_history_${username}`);
                document.getElementById('chat-messages-box').innerHTML = '';
                appendChatBubble(`Logs cleared. What structural T-Level policy parameters can I unpack for you now, ${getStudentName()}?`, 'bot');
            }
        }
    </script>
</body>
</html>
