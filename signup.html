<!doctype html>
<html lang="en">
<head>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="./accessibility.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Placements - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body id="dashboard-global-body" class="bg-[#eaeded] text-[#111111] antialiased font-sans min-h-screen transition-all duration-200">

    <div id="page-wrapper" class="w-full min-h-screen flex items-center justify-center mx-auto p-4 transition-all duration-300 bg-[#eaeded]">
        
        <div class="bg-white p-8 rounded-2xl shadow-md max-w-md w-full border border-slate-200 my-auto">
            <div class="text-center mb-6">
                <div class="flex items-baseline justify-center">
                    <span class="text-3xl font-bold text-[#ff9900] tracking-tight italic">amazon</span>
                    <span class="text-lg font-semibold text-slate-700 ml-0.5 tracking-wide">placements</span>
                </div>
                <p class="text-xs text-slate-500 mt-1 font-medium font-display">UK T-Level Portal Registration</p>
            </div>

            <div id="login-error" class="hidden mb-4 p-3 rounded-xl text-xs font-medium border bg-red-50 border-red-200 text-red-800"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Institutional Email Address</label>
                    <input id="signup-username" type="email" class="w-full px-4 py-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900] transition" placeholder="student@college.ac.uk" />
                </div>

                <button onclick="handlePortalRegistration()" class="w-full bg-[#ff9900] hover:bg-[#e48900] text-slate-900 py-2.5 rounded-xl font-bold text-xs transition tracking-wide cursor-pointer shadow-xs">
                    Send Verification Code
                </button>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-500">
                    Already have a placement registry account? 
                    <a href="./index.html" class="text-[#c45500] font-bold hover:underline ml-1">Sign In</a>
                </p>
            </div>
        </div>

    </div>

    <script src="./main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof applyGlobalAccessibilityStateTokens === 'function') {
                applyGlobalAccessibilityStateTokens();
            }
        });
    </script>
</body>
</html>
