<!doctype html>
<html lang="en">
<head>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="./accessibility.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Level Hub - Search Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&family=JetBrains+Mono:wght=400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body id="dashboard-global-body" class="bg-[#eaeded] text-[#111111] antialiased font-sans transition-all duration-200">

    <div id="page-wrapper" class="w-full min-h-screen flex flex-col mx-auto p-6 transition-all duration-300 bg-[#eaeded]">
        
        <div class="max-w-4xl mx-auto w-full space-y-6">
            
            <div class="bg-[#131921] p-4 rounded-xl shadow-md">
                <div class="flex items-center h-10 bg-white rounded-lg overflow-hidden border-2 border-transparent focus-within:border-[#ff9900]">
                    <span class="bg-slate-100 text-slate-600 px-4 h-full flex items-center font-medium text-xs border-r border-slate-200">
                        All Modules
                    </span>
                    <input id="search-input" type="text" oninput="executeSearchQuery()" placeholder="Search compliance, health & safety regulations, professional conduct..." class="w-full text-slate-800 px-4 outline-none text-xs" />
                    <button onclick="executeSearchQuery()" class="bg-[#ff9900] hover:bg-[#e48900] h-full px-6 text-slate-900 font-bold transition cursor-pointer">
                        🔍
                    </button>
                </div>
                <p class="text-[11px] text-slate-400 mt-2 px-1">
                    Try searching keywords like <span class="text-white underline cursor-pointer" onclick="fillSearch('safety')">"safety"</span>, <span class="text-white underline cursor-pointer" onclick="fillSearch('gdpr')">"gdpr"</span>, or <span class="text-white underline cursor-pointer" onclick="fillSearch('conduct')">"conduct"</span>.
                </p>
            </div>

            <div class="bg-white border border-slate-200 rounded-lg p-3 text-xs text-slate-600 flex justify-between items-center shadow-xs">
                <div>Showing matching index criteria mapping: <span id="results-count" class="font-bold text-[#c45500]">3 files available</span></div>
                <span class="text-[10px] bg-slate-100 font-mono px-2 py-0.5 rounded text-slate-500 font-bold">Local Directory Filter</span>
            </div>

            <div id="results-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

    </div>

    <script>
        const searchDatabase = [
            {
                title: "Health and Safety at Work Act (1974)",
                category: "Compliance Regulations",
                desc: "Core statutory framework safeguarding work environments across the UK. Requires comprehensive hazard inductions, proper PPE allocations, and incident log procedures.",
                badge: "Core Law"
            },
            {
                title: "GDPR & Data Protection Frameworks",
                category: "Data Security",
                desc: "Regulates secure personal record handling. Outlines strict confidentiality standards regarding employer logbooks, user encryption, and device security management.",
                badge: "Data Privacy"
            },
            {
                title: "Professional Conduct & Workplace Ethics",
                category: "Industry Standards",
                desc: "Expectation metrics mapping reliable client communication methods, punctuality protocols, and corporate infrastructure hierarchies aligned with DfE portfolio validation criteria.",
                badge: "Professionalism"
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            applyGlobalAccessibilityStateTokens();
            executeSearchQuery();
        });

        function fillSearch(keyword) {
            document.getElementById('search-input').value = keyword;
            executeSearchQuery();
        }

        function executeSearchQuery() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const container = document.getElementById('results-container');
            const counter = document.getElementById('results-count');
            
            const filtered = searchDatabase.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.category.toLowerCase().includes(query) || 
                item.desc.toLowerCase().includes(query)
            );

            counter.textContent = `${filtered.length} entry items matching criteria`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full bg-white p-8 rounded-xl border border-dashed border-slate-300 text-center text-slate-400 text-xs">
                        No matches tracked within training registry records.
                    </div>`;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl border border-slate-200 shadow-xs flex flex-col justify-between hover:border-slate-300 transition";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 font-mono">${item.category}</span>
                            <span class="bg-amber-100 text-amber-900 font-mono font-bold text-[9px] px-2 py-0.5 rounded">${item.badge}</span>
                        </div>
                        <h3 class="font-bold text-sm text-slate-900 tracking-tight">${item.title}</h3>
                        <p class="text-slate-600 text-xs mt-1.5 leading-relaxed">${item.desc}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-100 flex justify-end">
                        <button onclick="alert('Module locked. Authenticate via dashboard to launch module records.')" class="bg-slate-50 hover:bg-[#fff9f2] hover:text-[#c45500] hover:border-[#ff9900] text-[11px] font-bold px-3 py-1.5 rounded-lg border border-slate-200 transition cursor-pointer">
                            Launch Manual Details
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function applyGlobalAccessibilityStateTokens() {
            const body = document.getElementById('dashboard-global-body');
            const textScale = localStorage.getItem('access_text_scale') || 'small';
            const contrastMode = localStorage.getItem('access_contrast_mode') === 'true';

            body.classList.remove('text-sm', 'text-base', 'text-lg');
            if (textScale === 'large') body.classList.add('text-base');
            else if (textScale === 'xlarge') body.classList.add('text-lg');
            else body.classList.add('text-sm');

            if (contrastMode) {
                body.style.filter = "contrast(1.15) saturate(1.05)";
            } else {
                body.style.filter = "none";
            }

            const wrapper = document.getElementById('page-wrapper');
            if (wrapper) {
                const currentView = localStorage.getItem('device_view') || 'desktop';
                wrapper.classList.remove('max-w-[375px]', 'max-w-[768px]', 'max-w-full', 'border-x', 'border-slate-800/40', 'shadow-2xl');
                
                if (currentView === 'phone') {
                    wrapper.classList.add('max-w-[375px]', 'border-x', 'border-slate-800/40', 'shadow-2xl');
                } else if (currentView === 'tablet') {
                    wrapper.classList.add('max-w-[768px]', 'border-x', 'border-slate-800/40', 'shadow-2xl');
                } else {
                    wrapper.classList.add('max-w-full');
                }
            }
        }
    </script>
</body>
</html>
