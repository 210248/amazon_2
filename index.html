<!doctype html>
<html lang="en">
<head>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="./accessibility.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Level Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body id="dashboard-global-body" class="bg-[#eaeded] text-[#111111] antialiased font-sans flex flex-col items-center justify-center min-h-screen p-4 transition-all duration-200">

    <div id="page-wrapper" class="w-full min-h-screen flex flex-col items-center justify-center transition-all duration-300 bg-[#eaeded] p-4">
        
        <div class="bg-white p-8 rounded-2xl shadow-md max-w-md w-full border border-slate-200">
            <div class="text-center mb-6">
                <span class="text-3xl font-bold text-[#ff9900] tracking-tight">amazon</span>
                <span class="text-xs bg-slate-800 text-slate-300 px-2 py-0.5 rounded ml-1 font-mono">PORTAL</span>
            </div>

            <div id="login-error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 hidden"></div>

            <div id="signin-section">
                <h2 class="text-xl font-bold mb-1 font-display text-slate-900">Sign In / Quick Access</h2>
                <p class="text-slate-500 text-xs mb-4">Access your work experience tracker</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Email Address</label>
                        <input id="login-email" type="email" class="w-full px-4 py-2 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900]" placeholder="student@school.uk" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Password</label>
                        <input id="login-password" type="password" class="w-full px-4 py-2 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900]" placeholder="••••••••" />
                    </div>
                    
                    <button onclick="handlePortalLoginVerification()" class="w-full bg-[#131921] hover:bg-slate-800 text-[#ff9900] py-2.5 rounded-xl font-bold transition cursor-pointer">
                        Sign In
                    </button>
                    
                    <div class="relative flex py-1 items-center">
                        <div class="flex-grow border-t border-slate-200"></div>
                        <span class="flex-shrink mx-4 text-slate-400 text-[10px] uppercase font-bold tracking-wider">Or</span>
                        <div class="flex-grow border-t border-slate-200"></div>
                    </div>

                    <button onclick="handleGuestAccess()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-xs font-bold transition cursor-pointer border border-slate-200 shadow-sm">
                        Continue as Guest (No Account Required)
                    </button>
                </div>
                <p class="text-xs text-center text-slate-500 mt-4">New to the portal? <button onclick="toggleAuthView(true)" class="text-blue-600 hover:underline font-medium cursor-pointer bg-transparent border-0 outline-none">Create an account</button></p>
            </div>

            <div id="signup-section" class="hidden">
                <h2 class="text-xl font-bold mb-1 font-display text-slate-900">Create Account</h2>
                <p class="text-slate-500 text-xs mb-4">Verify your email to instantiate your portal profile</p>
                
                <div class="space-y-4">
                    <div id="signup-step-email">
                        <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">School / Institution Email</label>
                        <input id="signup-email" type="email" class="w-full px-4 py-2 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900]" placeholder="alex@school.ac.uk" />
                        <button onclick="sendVerificationToken()" class="w-full mt-3 bg-[#ff9900] hover:bg-[#e48900] text-slate-900 py-2.5 rounded-xl font-bold transition cursor-pointer">
                            Send Verification Code
                        </button>
                    </div>

                    <div id="signup-step-token" class="hidden space-y-3">
                        <div class="p-3 bg-amber-50 rounded-xl border border-amber-200 text-xs text-amber-800">
                            A verification code has been generated and dispatched to your email address.
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">6-Digit Verification Token</label>
                            <input id="signup-token" type="text" maxlength="6" class="w-full text-center tracking-widest text-lg font-bold px-4 py-2 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900]" placeholder="123456" />
                        </div>
                        <button onclick="handlePortalRegistrationVerify()" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-2.5 rounded-xl font-bold transition cursor-pointer">
                            Verify & Finish Registration
                        </button>
                    </div>
                </div>
                <p class="text-xs text-center text-slate-500 mt-4">Already have a profile? <button onclick="toggleAuthView(false)" class="text-blue-600 hover:underline font-medium cursor-pointer bg-transparent border-0 outline-none">Sign in instead</button></p>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            applyGlobalAccessibilityStateTokens();
        });

        function toggleAuthView(showSignup) {
            const errorBox = document.getElementById('login-error');
            if(errorBox) errorBox.classList.add('hidden');
            
            // Clear inputs when toggling
            document.getElementById('signup-email').value = '';
            const tokenInput = document.getElementById('signup-token');
            if(tokenInput) tokenInput.value = '';

            if (showSignup) {
                document.getElementById('signin-section').classList.add('hidden');
                document.getElementById('signup-section').classList.remove('hidden');
                document.getElementById('signup-step-email').classList.remove('hidden');
                document.getElementById('signup-step-token').classList.add('hidden');
            } else {
                document.getElementById('signup-section').classList.add('hidden');
                document.getElementById('signin-section').classList.remove('hidden');
            }
        }

        function handleGuestAccess() {
            localStorage.setItem('system_auth_checksum', 'guest_mode_active');
            localStorage.setItem('activeSession', 'Guest User');
            localStorage.setItem('activePathway', 'Temporary View (No Saved Data)');
            window.location.href = './dashboard.html';
        }

        // DISPATCH SECURE EMAIL TOKEN FROM SERVERLESS ROUTE
        async function sendVerificationToken() {
            const email = document.getElementById('signup-email').value.trim().toLowerCase();
            const errorBox = document.getElementById('login-error');
            errorBox.classList.add('hidden');

            if (!email || !email.includes('@')) {
                errorBox.textContent = "Please input a valid institutional email address.";
                errorBox.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (result.success) {
                    // Advance frontend sequence state to input code
                    document.getElementById('signup-step-email').classList.add('hidden');
                    document.getElementById('signup-step-token').classList.remove('hidden');
                } else {
                    errorBox.textContent = result.error || "Failed sending verification credentials.";
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = "Error communicating with endpoint service: /api/send-email";
                errorBox.classList.remove('hidden');
            }
        }

        // EXECUTE SECURE PROFILE PROVISION ON DATABASE
        async function handlePortalRegistrationVerify() {
            const email = document.getElementById('signup-email').value.trim().toLowerCase();
            const token = document.getElementById('signup-token').value.trim();
            const errorBox = document.getElementById('login-error');

            if (!token || token.length !== 6) {
                errorBox.textContent = "Please provide the complete 6-digit access code.";
                errorBox.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/db-signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: email, 
                        token: token
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert(`Account authorized successfully! Check your email inbox for your generated access credentials.`);
                    toggleAuthView(false);
                    document.getElementById('login-email').value = email;
                } else {
                    errorBox.textContent = result.error;
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = "Could not verify details with the sign-up handler database server.";
                errorBox.classList.remove('hidden');
            }
        }

        // SECURE LOGIN AUTHENTICATION VIA DB ENDPOINT
        async function handlePortalLoginVerification() {
            const emailInput = document.getElementById('login-email').value.trim().toLowerCase();
            const passInput = document.getElementById('login-password').value.trim();
            const errorBox = document.getElementById('login-error');

            if (!emailInput || !passInput) {
                errorBox.textContent = "Please fill in all tracking credentials.";
                errorBox.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/db-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, password: passInput })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('activeSession', result.name);
                    localStorage.setItem('activePathway', `Portal Role: ${result.role}`);
                    
                    if (result.role === 'IT Staff' || result.role === 'Teacher') {
                        localStorage.setItem('system_auth_checksum', 'sec_tok_0a4f6d'); // Admin clearance token
                        window.location.href = './admin.html';
                    } else {
                        localStorage.setItem('system_auth_checksum', 'sec_tok_8f92a1'); // Standard user token
                        window.location.href = './dashboard.html';
                    }
                } else {
                    errorBox.textContent = result.error;
                    errorBox.classList.remove('hidden');
                }
            } catch (error) {
                errorBox.textContent = "Could not authenticate with the live backend database.";
                errorBox.classList.remove('hidden');
            }
        }

        function applyGlobalAccessibilityStateTokens() {
            const body = document.getElementById('dashboard-global-body');
            const textScale = localStorage.getItem('access_text_scale') || 'small';
            const contrastMode = localStorage.getItem('access_contrast_mode') === 'true';

            body.classList.remove('text-sm', 'text-base', 'text-lg');
            if (textScale === 'large') body.classList.add('text-base');
            else if (textScale === 'xlarge') body.classList.add('text-lg');
            else body.classList.add('text-sm');

            if (contrastMode) {
                body.style.filter = "contrast(1.15) saturate(1.05)";
            } else {
                body.style.filter = "none";
            }
        }
    </script>
</body>
</html>
